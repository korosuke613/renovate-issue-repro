name: Run Renovate
on:
  workflow_dispatch:
    inputs:
      renovate_version:
        description: "Renovate version (e.g. 43.83.2, 43.84.2)"
        required: true
        default: "43.84.2"

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Run Renovate
        env:
          LOG_LEVEL: debug
        run: |
          pnpm dlx renovate@${{ inputs.renovate_version }} \
            --token ${{ steps.app-token.outputs.token }} \
            ${{ github.repository }}
